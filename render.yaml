services:
  # 1. Unified Node.js Express Gateway & React Client
  - type: web
    name: truthlens-web
    env: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false
        placeholder: "Paste your MongoDB Atlas connection string here"
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: truthlens-ai
          property: host

  # 2. Python FastAPI AI Core Microservice
  - type: web
    name: truthlens-ai
    env: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_service.py
    envVars:
      - key: HOST
        value: 0.0.0.0
