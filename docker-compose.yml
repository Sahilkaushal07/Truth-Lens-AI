version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: truthlens-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - truthlens-network

  redis:
    image: redis:7-alpine
    container_name: truthlens-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - truthlens-network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: truthlens-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URL=mongodb://mongodb:27017/truthlens
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=truthlens_cyber_security_secret_2026
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./uploads:/app/uploads
    networks:
      - truthlens-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: truthlens-ai
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./uploads:/app/uploads
    networks:
      - truthlens-network

  nginx:
    image: nginx:alpine
    container_name: truthlens-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - ai-service
    networks:
      - truthlens-network

volumes:
  mongodb_data:
  redis_data:

networks:
  truthlens-network:
    driver: bridge
